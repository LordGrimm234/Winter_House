<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tahr Central | Winter House</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Inter', sans-serif; overflow: hidden; }
        .sidebar-item.active { background: #2563eb; color: white; box-shadow: 0 4px 14px 0 rgba(37,99,235,0.39); }
        .glass-card { background: #161b22; border: 1px solid #30363d; border-radius: 1.5rem; }
    </style>
</head>
<body class="flex h-screen">
    <aside class="w-64 bg-[#161b22] border-r border-[#30363d] flex flex-col p-6">
        <div class="flex items-center gap-3 mb-12 px-2">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
                <i class="fas fa-shield-alt text-white text-xl"></i>
            </div>
            <h1 class="text-xl font-black text-white tracking-tighter uppercase">Tahr Central</h1>
        </div>
        <nav class="flex-1 space-y-2" id="sidebar-nav"></nav>
        <div class="mt-auto pt-6 border-t border-[#30363d]">
            <button id="admin-toggle" class="w-full py-2 rounded-lg text-[10px] font-bold uppercase tracking-widest bg-[#21262d] text-gray-500 hover:text-red-400 transition-colors">Admin Mode: Off</button>
        </div>
    </aside>
    <main class="flex-1 overflow-y-auto p-8" id="main-content"></main>
    <script type="module" src="js/app.js"></script>
</body>
</html>
